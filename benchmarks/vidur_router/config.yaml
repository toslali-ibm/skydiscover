language: python
file_suffix: .py
diff_based_generation: true
max_iterations: 50
checkpoint_interval: 5
max_solution_length: 40000

llm:
  models:
    - name: "aws/claude-sonnet-4-5"
      weight: 0.7
    - name: "aws/claude-opus-4-6"
      weight: 0.3
  api_base: "https://ete-litellm.ai-models.vpc-int.res.ibm.com"
  temperature: 1.0
  top_p: null
  max_tokens: 32000
  timeout: 120

prompt:
  system_message: |
    You are optimizing a request router for a 4-replica LLM inference cluster.

    GOAL: Minimize end-to-end latency by improving how requests are routed to replicas.

    BASELINE: Least Outstanding Requests (LOR) — routes to the replica with fewest
    pending requests. Ignores request size and memory pressure.
    KNOWN WEAKNESS: A 4096-token prefill routed to a replica with 1 pending request
    is suboptimal if another replica with 2 small pending requests would finish sooner.
    Improving work-awareness is a key opportunity.

    AVAILABLE SIGNALS — from request (properties on request objects):
      - num_prefill_tokens (int): input tokens (prefill costs ~3x more compute than decode)
      - num_decode_tokens (int): output tokens to generate
      - total_tokens (int): prefill + decode
      - pd_ratio (float): prefill/decode ratio (high = compute-heavy)

    AVAILABLE SIGNALS — from replica (via replica_schedulers dict values):
      - replica_id (int): unique replica identifier
      - num_pending_requests (int): queue depth (requests waiting + in-progress)
      - memory_usage_percent (int): 0-100% KV-cache memory utilization
      - is_empty() (bool): no pending work

    SIGNAL FRESHNESS:
    All signals are real-time (simulation state). In production, queue depth and
    memory would have ~5s staleness from Prometheus scraping. Algorithms robust
    to stale signals are preferred. Memory starts at 0 and only becomes informative
    after requests have been processed.

    RULES (syntax errors waste an iteration):
    1. Only modify code between EVOLVE-BLOCK-START and EVOLVE-BLOCK-END
    2. Must be valid Python — guard all divisions against zero
    3. Must populate request_mapping with (replica_id, request) tuples for ALL requests
    4. replica_id values MUST come from replica_schedulers.keys()
    5. Do NOT redefine schedule() or add a return — they exist outside the block

    EVALUATION: Score = -0.5 * avg_e2e_ms - 0.5 * avg_p95_ms (lower latency = higher score)
    Tested on 3 workloads with different routing tensions:
      - cache_warmup: prefix diversity across 4 groups, moderate rate
      - load_spikes: heavy-hitter prefix with bursty arrival
      - multiturn: multi-turn sessions with accumulated context

search:
  type: "adaevolve"
  num_context_programs: 4
  database:
    random_seed: 42

evaluator:
  timeout: 900
  cascade_evaluation: false
