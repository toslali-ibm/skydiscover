# Multi-Turn Session Affinity
#
# Tests routing for multi-turn conversations where session stickiness matters.
# Sessions returning to the same instance get fast KV cache hits; bouncing to
# a different instance forces full context recomputation (costly with large prefixes).
# Short outputs keep decode time low so cache hit/miss is a large fraction of e2e.
#
# 9,000 requests at 150 req/s (60 seconds simulated).
# Request mix:
#   - 40% heavy coding sessions (4096 token prefix, input ~80 tokens, output ~15 tokens, 5 rounds)
#   - 25% chat sessions (2048 token prefix, input ~60 tokens, output ~15 tokens, 4 rounds)
#   - 15% Q&A sessions (1024 token prefix, input ~50 tokens, output ~10 tokens, 3 rounds)
#   - 20% single-turn realtime (no prefix, input ~40 tokens, output ~10 tokens, needs load balance)

version: "1"
seed: 42
category: reasoning
aggregate_rate: 150.0
num_requests: 9000

clients:
  # Heavy coding sessions: very large prefix (4096), short output.
  # Cache miss on turn 2+ costs ~4096 * 17.67us = 72.4ms + accumulated context.
  # By turn 3-4, context is ~4300 tokens -> cache miss costs ~76ms.
  # With short output (15 tokens, ~104ms decode), 72ms = 40% of request time.
  - id: "heavy-coding-sessions"
    tenant_id: "developers"
    slo_class: "interactive"
    rate_fraction: 0.40
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 80
        std_dev: 20
        min: 30
        max: 200
    output_distribution:
      type: exponential
      params:
        mean: 15
    prefix_group: "coding-system-prompt"
    prefix_length: 4096
    reasoning:
      multi_turn:
        max_rounds: 5
        think_time_us: 30000    # 30ms - fast, sessions stay active
        context_growth: accumulate

  # Moderate chat sessions: large prefix, short output.
  # Cache miss costs ~2048 * 17.67us = 36.2ms.
  - id: "chat-sessions"
    tenant_id: "chat-users"
    slo_class: "interactive"
    rate_fraction: 0.25
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 60
        std_dev: 15
        min: 20
        max: 150
    output_distribution:
      type: exponential
      params:
        mean: 15
    prefix_group: "chat-system-prompt"
    prefix_length: 2048
    reasoning:
      multi_turn:
        max_rounds: 4
        think_time_us: 50000    # 50ms
        context_growth: accumulate

  # Light Q&A sessions: large prefix, very short output.
  # Third prefix group forces prefix-affinity to share instances (3 groups, 4 instances).
  # Cache miss costs ~1024 * 17.67us = 18.1ms.
  - id: "qa-sessions"
    tenant_id: "qa-users"
    slo_class: "interactive"
    rate_fraction: 0.15
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 50
        std_dev: 10
        min: 20
        max: 120
    output_distribution:
      type: exponential
      params:
        mean: 10
    prefix_group: "qa-system-prompt"
    prefix_length: 1024
    reasoning:
      multi_turn:
        max_rounds: 3
        think_time_us: 40000
        context_growth: accumulate

  # Single-turn realtime: no prefix, no session, needs low latency.
  # Should route to least-loaded instances, avoiding session-heavy ones.
  - id: "realtime-api"
    slo_class: "realtime"
    rate_fraction: 0.20
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 40
        std_dev: 10
        min: 10
        max: 100
    output_distribution:
      type: exponential
      params:
        mean: 10
    # No prefix, no multi-turn - tests load balancing
