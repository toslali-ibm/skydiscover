# Load Spikes — Heavy-Hitter Prefix with Bursty Arrival
#
# Tests routing under load spikes when one prefix group dominates traffic.
# 50% of all traffic shares one large prefix, arriving in bursts (gamma CV=3).
# Prefix-affinity wants to pile it all onto one instance, creating 2x overload.
# A good router must spread load despite cache affinity.
#
# 18,000 requests at 300 req/s (60 seconds simulated).
# Request mix:
#   - 50% heavy-prefix batch (512 token prefix, input ~400 tokens, output ~120 tokens, bursty gamma CV=3)
#   - 25% realtime no-prefix (input ~80 tokens, output ~30 tokens, streaming, needs low latency)
#   - 25% light-prefix interactive (384 token prefix, input ~200 tokens, output ~60 tokens, steady poisson)

version: "1"
seed: 42
category: language
aggregate_rate: 300.0
num_requests: 18000

clients:
  # Heavy hitter: 50% of ALL traffic, large shared prefix, bursty arrival.
  # Prefix-affinity locks this to one instance → creates 2x average load there.
  - id: "heavy-prefix-batch"
    slo_class: "batch"
    rate_fraction: 0.50
    streaming: false
    arrival:
      process: gamma
      cv: 3.0
    input_distribution:
      type: gaussian
      params:
        mean: 400
        std_dev: 120
        min: 100
        max: 800
    output_distribution:
      type: exponential
      params:
        mean: 120
    prefix_group: "heavy-system-prompt"
    prefix_length: 512  # Large prefix: prefix-affinity strongly favors cached instance

  # Realtime: needs low latency, must route AWAY from the heavy-prefix instance.
  # No prefix → prefix-affinity gives 0 score → load-balance decides.
  # But with [0.5, 0.5] weights, the heavy instance's load-balance penalty
  # may not overcome other instances' prefix-affinity=0.
  - id: "realtime-critical"
    slo_class: "realtime"
    rate_fraction: 0.25
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 80
        std_dev: 20
        min: 30
        max: 180
    output_distribution:
      type: exponential
      params:
        mean: 30
    # No prefix group - pure load-balance routing

  # Second prefix group: different prefix, steady arrival.
  # Tests whether router can maintain cache affinity for this group
  # while managing the heavy-prefix group's load impact.
  - id: "light-prefix-interactive"
    slo_class: "interactive"
    rate_fraction: 0.25
    streaming: false
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 200
        std_dev: 50
        min: 80
        max: 400
    output_distribution:
      type: exponential
      params:
        mean: 60
    prefix_group: "light-system-prompt"
    prefix_length: 384
