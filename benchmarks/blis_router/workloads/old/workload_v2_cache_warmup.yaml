# Cache Warmup & Exploitation
#
# Tests routing when prefix caches are warm and creating load imbalance.
# 3 prefix groups across 4 instances means one instance is underutilized.
# A good router balances load while still exploiting cache hits.
#
# 12,000 requests at 200 req/s (60 seconds simulated).
# Request mix:
#   - 30% chatbot prefix (512 tokens, input ~300 tokens, output ~64 tokens)
#   - 30% code-assistant prefix (384 tokens, input ~400 tokens, output ~80 tokens)
#   - 25% API-gateway prefix (128 tokens, input ~100 tokens, output ~40 tokens, realtime SLO)
#   - 15% no-prefix unique requests (input ~600 tokens, output ~150 tokens, batch SLO, bursty)

version: "1"
seed: 42
category: language
aggregate_rate: 200.0
num_requests: 12000

clients:
  # Group A: Shared system prompt (e.g., chatbot)
  - id: "prefix-group-a"
    slo_class: "interactive"
    rate_fraction: 0.30
    streaming: false
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 300
        std_dev: 80
        min: 100
        max: 600
    output_distribution:
      type: exponential
      params:
        mean: 64
    prefix_group: "system-prompt-chatbot"
    prefix_length: 512

  # Group B: Different system prompt (e.g., code assistant)
  - id: "prefix-group-b"
    slo_class: "interactive"
    rate_fraction: 0.30
    streaming: false
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 400
        std_dev: 100
        min: 150
        max: 800
    output_distribution:
      type: exponential
      params:
        mean: 80
    prefix_group: "system-prompt-code"
    prefix_length: 384

  # Group C: Short shared prefix (e.g., API gateway)
  - id: "prefix-group-c"
    slo_class: "realtime"
    rate_fraction: 0.25
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 100
        std_dev: 30
        min: 40
        max: 250
    output_distribution:
      type: exponential
      params:
        mean: 40
    prefix_group: "api-gateway-prompt"
    prefix_length: 128

  # No-prefix traffic: pure load balancing test
  - id: "unique-requests"
    slo_class: "batch"
    rate_fraction: 0.15
    streaming: false
    arrival:
      process: gamma
      cv: 3.0
    input_distribution:
      type: gaussian
      params:
        mean: 600
        std_dev: 200
        min: 200
        max: 1200
    output_distribution:
      type: exponential
      params:
        mean: 150
