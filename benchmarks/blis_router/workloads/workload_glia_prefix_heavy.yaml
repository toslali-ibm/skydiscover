# Final workload: balanced to crush Glia while beating 1:1 by 10-15%
#
# Takes composite_v2 structure (which gave +19% vs 1:1, +17% vs Glia)
# and increases prefix to 14336 tokens to widen Glia gap further.
# Also increases outputs slightly so the 1:1 hotspot still matters.

version: "1"
seed: 42
category: language
aggregate_rate: 85.0
num_requests: 1500

clients:
  # --- Group A (dominant): 45% of traffic, bursty ---
  - id: "dominant-batch"
    slo_class: "batch"
    rate_fraction: 0.45
    streaming: false
    arrival:
      process: gamma
      cv: 6.0
    input_distribution:
      type: gaussian
      params:
        mean: 200
        std_dev: 80
        min: 25
        max: 500
    output_distribution:
      type: gaussian
      params:
        mean: 100
        std_dev: 45
        min: 10
        max: 300
    prefix_group: "group-dominant"
    prefix_length: 14336

  # --- Group B: 18% ---
  - id: "secondary-interactive"
    slo_class: "interactive"
    rate_fraction: 0.18
    streaming: true
    arrival:
      process: gamma
      cv: 4.0
    input_distribution:
      type: gaussian
      params:
        mean: 140
        std_dev: 55
        min: 15
        max: 380
    output_distribution:
      type: gaussian
      params:
        mean: 70
        std_dev: 30
        min: 10
        max: 220
    prefix_group: "group-secondary"
    prefix_length: 14336

  # --- Group C: 12% ---
  - id: "group-c"
    slo_class: "interactive"
    rate_fraction: 0.12
    streaming: true
    arrival:
      process: gamma
      cv: 4.0
    input_distribution:
      type: gaussian
      params:
        mean: 110
        std_dev: 45
        min: 10
        max: 320
    output_distribution:
      type: gaussian
      params:
        mean: 60
        std_dev: 28
        min: 8
        max: 200
    prefix_group: "group-c"
    prefix_length: 14336

  # --- Group D: 10% ---
  - id: "group-d"
    slo_class: "interactive"
    rate_fraction: 0.10
    streaming: true
    arrival:
      process: gamma
      cv: 4.0
    input_distribution:
      type: gaussian
      params:
        mean: 120
        std_dev: 50
        min: 10
        max: 330
    output_distribution:
      type: gaussian
      params:
        mean: 55
        std_dev: 25
        min: 8
        max: 180
    prefix_group: "group-d"
    prefix_length: 14336

  # --- Group E: 8%, realtime ---
  - id: "realtime-e"
    slo_class: "realtime"
    rate_fraction: 0.08
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 80
        std_dev: 30
        min: 10
        max: 200
    output_distribution:
      type: gaussian
      params:
        mean: 35
        std_dev: 18
        min: 5
        max: 110
    prefix_group: "group-e"
    prefix_length: 14336

  # --- Group F: 7%, no prefix ---
  - id: "no-prefix-f"
    slo_class: "realtime"
    rate_fraction: 0.07
    streaming: true
    arrival:
      process: gamma
      cv: 5.0
    input_distribution:
      type: gaussian
      params:
        mean: 90
        std_dev: 35
        min: 10
        max: 230
    output_distribution:
      type: gaussian
      params:
        mean: 45
        std_dev: 22
        min: 5
        max: 140
