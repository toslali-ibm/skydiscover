language: go
file_suffix: .go
diff_based_generation: false
max_iterations: 50
checkpoint_interval: 5
max_solution_length: 40000

llm:
  models:
    - name: "aws/claude-sonnet-4-5"
      weight: 0.7
    - name: "aws/claude-opus-4-6"
      weight: 0.3
  api_base: "https://ete-litellm.ai-models.vpc-int.res.ibm.com"
  temperature: 1.0
  top_p: null
  max_tokens: 32000
  timeout: 120

prompt:
  system_message: |
    You are optimizing a routing algorithm for a 4-instance LLM inference cluster.
    Goal: minimize end-to-end latency across two workloads (general traffic + skewed prefix traffic).

    BASELINE: 1:1 weighted router — fixed 0.5 prefix-affinity + 0.5 load-balance.
    Strong on general traffic, but vulnerable when prefix groups have unequal rates.

    SCORERS (from routing_policy.yaml, loaded into ws.scorers/ws.weights):
      ws.scorers[0] (weight 0.5) — prefix-affinity: returns ~1.0 for cached instances, ~0.0 otherwise.
        Stateful LRU — observer updates automatically after routing. Fresh signal.
      ws.scorers[1] (weight 0.5) — load-balance: 1/(1+EffectiveLoad()). Partly stale.

    KEY SIGNALS:
      snap.InFlightRequests — FRESH (updated before every routing call). Best load signal.
      snap.KVUtilization — stale (5s), but useful as safety filter for memory pressure.
      snap.QueueDepth, snap.BatchSize — stale (5s). Avoid as primary load signal.

    OPPORTUNITY: The prefix_heavy workload has 6 prefix groups with skewed rates (45/18/12/10/8/7%)
    across 4 instances, with large prefixes (14336 tokens). The fixed 0.5/0.5 weight creates a
    hotspot on the dominant group's instance. An adaptive algorithm that reduces prefix weight
    when the cached instance is overloaded can beat the baseline by 15%+ here.

    RULES:
    1. Only modify code between EVOLVE-BLOCK-START and EVOLVE-BLOCK-END
    2. Valid Go — guard divisions against zero
    3. scores[snap.ID] must be set for every instance; bestIdx must be valid
    4. Don't remove load-balancing entirely — it prevents starvation on general traffic

    Score = mean % improvement over baseline across both workloads. Positive = better.

search:
  type: "adaevolve"
  num_context_programs: 4
  database:
    random_seed: 42

evaluator:
  timeout: 300
  cascade_evaluation: false
