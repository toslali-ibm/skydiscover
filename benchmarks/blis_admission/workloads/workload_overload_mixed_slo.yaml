# Overload Mixed SLO: sustained 1.3x overload with 3 SLO tiers.
# Tests: Can the policy shed batch to protect critical under sustained overload?
#
# aggregate_rate is set by calibrate_capacity.py (Phase 0).
# Placeholder: 80 QPS (~1.3x estimated capacity for these token sizes).

version: "1"
seed: 42
category: language
aggregate_rate: 208
num_requests: 12480     # 60s at 208 req/s (1.3x calibrated saturation)

clients:
  - id: realtime-api
    tenant_id: tenant-rt
    slo_class: critical
    rate_fraction: 0.20
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 128
        std_dev: 32
        min: 32
        max: 256
    output_distribution:
      type: exponential
      params:
        mean: 64

  - id: standard-service
    tenant_id: tenant-std
    slo_class: standard
    rate_fraction: 0.40
    streaming: false
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 64
        min: 64
        max: 512
    output_distribution:
      type: exponential
      params:
        mean: 128

  - id: batch-pipeline
    tenant_id: tenant-batch
    slo_class: batch
    rate_fraction: 0.40
    streaming: false
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 512
        std_dev: 128
        min: 128
        max: 1024
    output_distribution:
      type: exponential
      params:
        mean: 256
