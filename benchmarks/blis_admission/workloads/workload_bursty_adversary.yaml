# Bursty Adversary: 2 steady critical tenants + 1 bursty batch + 1 sheddable bulk.
# Tests: Can the policy isolate critical during burst events without over-rejecting in calm?
#
# aggregate_rate is set by calibrate_capacity.py (Phase 0).
# Placeholder: 320 QPS (~2x baseline, bursts push higher).

version: "1"
seed: 42
category: language
aggregate_rate: 320
num_requests: 19200     # 60s at 320 req/s (2.0x calibrated saturation)

clients:
  - id: critical-steady-1
    tenant_id: tenant-crit-1
    slo_class: critical
    rate_fraction: 0.15
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 128
        std_dev: 32
        min: 32
        max: 256
    output_distribution:
      type: exponential
      params:
        mean: 64

  - id: critical-steady-2
    tenant_id: tenant-crit-2
    slo_class: critical
    rate_fraction: 0.15
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 128
        std_dev: 32
        min: 32
        max: 256
    output_distribution:
      type: exponential
      params:
        mean: 64

  - id: standard-service
    tenant_id: tenant-std
    slo_class: standard
    rate_fraction: 0.20
    streaming: false
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 64
        min: 64
        max: 512
    output_distribution:
      type: exponential
      params:
        mean: 128

  - id: batch-adversary
    tenant_id: tenant-batch
    slo_class: batch
    rate_fraction: 0.25
    streaming: false
    arrival:
      process: gamma
      cv: 4.0
    input_distribution:
      type: gaussian
      params:
        mean: 768
        std_dev: 256
        min: 128
        max: 2048
    output_distribution:
      type: exponential
      params:
        mean: 256

  - id: sheddable-bulk
    tenant_id: tenant-shed
    slo_class: sheddable
    rate_fraction: 0.25
    streaming: false
    arrival:
      process: gamma
      cv: 3.0
    input_distribution:
      type: gaussian
      params:
        mean: 512
        std_dev: 128
        min: 128
        max: 1024
    output_distribution:
      type: exponential
      params:
        mean: 192
