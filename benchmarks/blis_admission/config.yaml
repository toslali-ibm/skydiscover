language: go
file_suffix: .go
diff_based_generation: false
max_iterations: 50
checkpoint_interval: 5
max_solution_length: 40000

llm:
  models:
    - name: "aws/claude-sonnet-4-5"
      weight: 0.7
    - name: "aws/claude-opus-4-5"
      weight: 0.3
  api_base: "https://ete-litellm.ai-models.vpc-int.res.ibm.com"
  temperature: 1.0
  top_p: null
  max_tokens: 32000
  timeout: 120

prompt:
  system_message: |
    You are optimizing an admission control policy for a 4-instance LLM inference cluster
    under 2x overload (320 QPS against 160 QPS capacity).

    PROBLEM: Under heavy overload, admitting everything causes critical tenants to miss
    their SLO targets. Your job is to selectively reject low-priority requests (batch,
    sheddable) to protect high-priority ones (critical, standard).

    SCORING (higher is better):
      - Weighted SLO attainment (50%): Class-weighted average of per-class SLO attainment.
        Weights: critical=4, standard=2, sheddable=1, batch=0.5.
        KEY: Rejected batch/sheddable are EXCLUDED from SLO calculation (correct shedding).
        Rejected critical/standard still count as SLO misses.
      - Throughput (30%): min(completed/total, 0.50) / 0.50. Up to 50% shedding is FREE.
      - Jain fairness (20%): equal completion rates across tenants.

    BASELINE (always-admit): Score ~0.62. Critical SLO attainment only ~25%.
    ORACLE (shed batch on load): Score ~0.85. Critical SLO attainment ~87%.
    You must beat the baseline. Target: 0.85+.

    HINT: The key insight is that under overload, selectively rejecting lower-priority
    requests can protect higher-priority ones. Consider what signals best indicate
    current cluster load, and how to use SLO class and tenant identity to make
    fair, priority-aware admission decisions. The available cluster state signals
    vary in freshness — some are updated every request, others are stale by seconds.

    GENERALIZATION REQUIREMENT: This policy will be deployed on a real LLM serving
    cluster (llm-d) across different workload intensities and cluster sizes.
    - Do NOT hardcode magic constants tuned to this specific simulation.
    - Prefer normalized signals (e.g., per-instance ratios) over absolute counts.
    - Prefer adaptive thresholds derived from observed cluster state (e.g.,
      windowed averages, percentiles of recent load) over fixed numeric cutoffs.
    - If you must use thresholds, explain clearly what cluster property they
      represent and why that value should generalize (e.g., "this is X% of typical
      per-instance capacity" rather than an arbitrary number).
    - Stateful adaptation (updating thresholds based on recent observations) is
      encouraged — the policy runs continuously and can learn from its history.

    AVAILABLE SIGNALS — from request:
      - inputLen: number of input tokens (cost proxy)
      - sloClass: "critical", "standard", "sheddable", or "batch"
      - tenantID: unique tenant identifier

    AVAILABLE SIGNALS — from cluster state:
      - numInstances: number of instances (4)
      - totalInFlight: sum of InFlightRequests across all instances (FRESH every call)
      - totalQueueDepth: sum of QueueDepth across instances (stale up to 5s)
      - maxKVUtil: highest KVUtilization across instances (stale up to 5s)
      - avgKVUtil: mean KVUtilization (stale up to 5s)
      - minFreeKV: fewest FreeKVBlocks on any instance (stale up to 5s)
      - clock: simulation clock in microseconds

    AVAILABLE STATE — persistent across calls (read/write via a.*):
      - a.tenantTokens[tenantID]: float64 budget per tenant
      - a.tenantRequests[tenantID]: int counter per tenant
      - a.classCounters[sloClass]: int counter per SLO class
      - a.windowStart, a.windowCount: sliding window tracking
      - a.totalAdmitted, a.totalRejected: lifetime counters
      - a.lastClock: previous call's clock value

    Return (true, "") to admit, (false, "reason") to reject.

    RULES (compilation failures waste an iteration):
    1. Only modify code between EVOLVE-BLOCK-START and EVOLVE-BLOCK-END
    2. Must be valid Go — guard all divisions to avoid divide-by-zero
    3. Must return (bool, string) — true to admit, false to reject
    4. Use the pre-provisioned state maps — don't add struct fields
    5. All map reads on tenantTokens/tenantRequests/classCounters are safe (pre-initialized)

    EVALUATION: 2 overload workloads at 2x capacity:
      - overload_mixed_slo: sustained 2x overload, 4 tiers, 4 tenants
      - bursty_adversary: 2 critical + 1 standard + 1 bursty batch + 1 sheddable, 5 tenants

search:
  type: "adaevolve"
  num_context_programs: 4
  database:
    random_seed: 42

evaluator:
  timeout: 300
  cascade_evaluation: false
